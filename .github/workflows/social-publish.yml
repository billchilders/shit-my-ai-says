name: Publish Social Echoes

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/*.md'
      - 'assets/posts/**'
      - 'scripts/publish-social.mjs'
      - 'scripts/new-post.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/social-publish.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without publishing to social platforms'
        required: false
        default: 'true'
      post_path:
        description: 'Optional specific post file to process'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish new posts to social
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          BSKY_IDENTIFIER: ${{ secrets.BSKY_IDENTIFIER }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: |
          args=()
          if [ "${{ github.event_name }}" = "push" ]; then
            args+=(--dry-run)
          fi
          if [ "${{ github.event.inputs.dry_run || 'true' }}" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ -n "${{ github.event.inputs.post_path || '' }}" ]; then
            args+=(--post "${{ github.event.inputs.post_path }}")
          fi
          node scripts/publish-social.mjs "${args[@]}"
